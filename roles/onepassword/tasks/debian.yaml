---
- name: "Create APT Keyrings Directory"
  become: true
  ansible.builtin.file:
    path: "/etc/apt/keyrings"
    state: directory
    mode: "0755"

- name: "Create Temp Dir"
  ansible.builtin.file:
    path: "/tmp/{{ playbook_dir | basename }}/ansible.roles/{{ role_name }}"
    state: directory
    mode: "0755"
  register: onepassword_op_temp

- name: "Download 1password Signing Key"
  ansible.builtin.get_url:
    url: https://downloads.1password.com/linux/keys/1password.asc
    dest: "{{ onepassword_op_temp.path }}"
    mode: "0644"
  register: onepassword_op_repo_key

- name: "Dearmor 1password Signing Key" # noqa: no-handler
  ansible.builtin.command:
    cmd: >-
      gpg --batch --yes
      --output {{ onepassword_op_temp.path }}/dearmored.1password.gpg
      --dearmor {{ onepassword_op_repo_key.dest }}
  changed_when: true
  when: onepassword_op_repo_key.changed

- name: "Copy 1password Signing Key To Keyrings"
  become: true
  ansible.builtin.copy:
    src: "{{ onepassword_op_temp.path }}/dearmored.1password.gpg"
    dest: "/etc/apt/keyrings/1password.gpg"
    mode: "0644"

- name: "Get OS Arch"
  ansible.builtin.command: dpkg --print-architecture
  register: onepassword_arch
  changed_when: false

- name: "Add APT Source List"
  become: true
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/1password.list
    content: >-
      deb [arch={{ onepassword_arch.stdout }} signed-by=/etc/apt/keyrings/1password.gpg]
      https://downloads.1password.com/linux/debian/{{ onepassword_arch.stdout }} stable main
    mode: "0644"

- name: Install 1password
  become: true
  ansible.builtin.apt:
    state: present
    autoremove: true
    install_recommends: false
    update_cache: true
    name:
      - 1password
      - 1password-cli
