---
- name: "Setup Shell Env For Homebrew"
  ansible.builtin.blockinfile:
    path: "{{ shared_env_sh.dest }}"
    marker: "#### {mark} ANSIBLE MANAGED BLOCK - {{ playbook_dir | basename }}/roles/{{ role_name }} ####"
    create: true
    mode: "0644"
    block: |
      eval "$(/opt/homebrew/bin/brew shellenv)"
      export PATH="$(brew --prefix)/opt/gnu-tar/libexec/gnubin:$PATH"
      export PATH="$(brew --prefix)/opt/gnu-getopt/bin:$PATH"

- name: "Install Homebrew Casks"
  community.general.homebrew_cask:
    accept_external_apps: true
    state: present
    name: "{{ base_homebrew_cask_packages }}"

- name: "Install Packages - {{ ansible_facts['distribution'] }}"
  ansible.builtin.package:
    state: present
    name: "{{ base_homebrew_packages }}"
