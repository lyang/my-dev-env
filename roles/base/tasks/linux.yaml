---
- name: "Setup Shell Env For Homebrew"
  ansible.builtin.blockinfile:
    path: "{{ shared_env_sh.dest }}"
    marker: "#### {mark} ANSIBLE MANAGED BLOCK - {{ playbook_dir | basename }}/roles/{{ role_name }} ####"
    create: true
    mode: "0644"
    block: |
      eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"

- name: Install Common Packages
  become: true
  ansible.builtin.package:
    state: present
    name: "{{ base_required_packages['common'] + base_optional_packages['common'] }}"

- name: "Install Packages - {{ ansible_facts['distribution'] }}"
  ansible.builtin.include_tasks:
    file: "distros/{{ ansible_facts['distribution'] | lower }}.yaml"
