---
- name: "Install Python {{ python_version }}"
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      pyenv install --skip-existing {{ python_version }}
  changed_when: true

- name: "Find Installed Packages"
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -o pipefail
      PYENV_VERSION={{ python_version }} pyenv exec pip list --format freeze | grep --extended-regex --only-matching --color=never '^[^=]*'
  register: pyenv_pip_installed_packages
  changed_when: false

- name: "Install PIP Packages"
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      PYENV_VERSION={{ python_version }} pyenv exec pip install --upgrade {{ pip_package }}
  loop_control:
    loop_var: pip_package
  loop: "{{ pyenv_pip_packages }}"
  changed_when: pip_package not in pyenv_pip_installed_packages.stdout_lines
