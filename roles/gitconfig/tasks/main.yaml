---
- name: "Check include.path"
  community.general.git_config_info:
    scope: global
    name: include.path
  register: gitconfig_inclusion

- name: "Add include.path {{ gitconfig_path }}"
  community.general.git_config:
    scope: global
    name: include.path
    value: "{{ gitconfig_path }}"
    state: present
  when: gitconfig_inclusion.config_values is not contains(gitconfig_path)

- name: "Check user.signingkey"
  community.general.git_config_info:
    scope: global
    name: user.signingkey
  register: gitconfig_signingkey

- name: "Set user.signingkey"
  community.general.git_config:
    scope: global
    name: user.signingkey
    value: "{{ ansible_facts['env'].GIT_USER_SIGNINGKEY }}"
    state: present
  when:
    - gitconfig_signingkey.config_value|length == 0
    - ansible_facts['env'].GIT_USER_SIGNINGKEY is defined
