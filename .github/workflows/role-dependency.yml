name: Role Dependency
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  find-roles:
    runs-on: ubuntu-latest
    outputs:
      roles: ${{ steps.roles.outputs.roles }}
    steps:
      - uses: actions/checkout@v4
      - id: "roles"
        run: |
          echo "roles=[$(ls roles | sed -E 's/(.*)/\"\1\"/g' | paste -sd , -)]"
          echo "roles=[$(ls roles | sed -E 's/(.*)/\"\1\"/g' | paste -sd , -)]" >> "$GITHUB_OUTPUT"
          echo $GITHUB_OUTPUT

  apply-role:
    runs-on: ubuntu-latest
    needs: find-roles
    strategy:
      matrix:
        role: ${{ fromJson(needs.find-roles.outputs.roles) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - id: "apply"
        run: |
          ./setup.sh --tags ${{ matrix.role }}

